# Read the Docs configuration — see https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  # Strict mode disabled while pre-existing docstring-formatting
  # warnings (duplicate dataclass fields, mixed RST/MD nits) are
  # accumulated. Flip back to true once the source docstrings have
  # been cleaned up — the docs/ tree itself is warning-free.
  fail_on_warning: false

formats:
  - pdf
  - htmlzip

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - plots
        - windio
