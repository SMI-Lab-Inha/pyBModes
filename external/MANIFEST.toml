    "glue-codes/openfast/5MW_Land_DLL_WTurb/NRELOffshrBsline5MW_Onshore_ElastoDyn.dat",
    "glue-codes/openfast/5MW_Baseline/NRELOffshrBsline5MW_Onshore_ElastoDyn_Tower.dat",
    "glue-codes/openfast/5MW_Baseline/NRELOffshrBsline5MW_Blade.dat",
]
