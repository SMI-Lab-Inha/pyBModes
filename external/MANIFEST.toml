# external/MANIFEST.toml — pinned reproducibility manifest for the
# integration-test track.
#
# Each ``[clone.<name>]`` block declares:
#
#   repo           upstream repository URL (or a non-git source note).
#   sha            commit SHA to check out — immutable, unlike a branch
#                  or tag.
#   relative_path  where the integration tests resolve the clone.
#   optional       true  → cross-comparison / non-redistributable extra;
#                         a missing clone is SKIP-tolerated everywhere.
#                  false/absent → required; a missing clone is a hard
#                         FAIL under ``--strict`` (so a green validation
#                         run can't hide an unchecked pinned entry).
#   hash_files     files whose content hash ``--update`` records in ``hashes``.
#   hashes         normalized-content (CRLF->LF) SHA-256 pins that
#                  ``--strict`` re-checks; an upstream file rewritten in
#                  place (same SHA) is then caught, cross-platform.
#
# A reproducible run of ``pytest -m integration`` against the published
# 0.01 % tolerance requires every *required* clone here at its pinned SHA.
#
# Bumping a clone to a newer SHA is a deliberate maintainer action
# documented in the corresponding CHANGELOG entry under *Changed*.
#
# To clone / verify your local ``external/`` against this manifest::
#
#     python scripts/verify_external_data.py --clone     # fetch required
#     python scripts/verify_external_data.py --strict    # gate (hard-fail)
#     python scripts/verify_external_data.py --update     # MAINTAINER: re-pin
#
# A clone whose remote SHA matches the pin but whose hashed files
# disagree means the upstream repo has been rewritten in-place — flag
# it as a release-blocker.

[manifest]
schema_version = 1
last_updated = "2026-05-21"
maintainer = "Jae Hoon Seo <jaehoon.seo@inha.ac.kr>"
# 1.8.1 maintainer action — populated every ``sha = "TBD"`` from the
# local clone HEADs at the 1.8.1 release-prep snapshot. Bumping a
# pin is a deliberate maintainer action documented in the
# corresponding CHANGELOG entry under *Changed*.
#
# File-hash pins — STATUS: ACTIVE. Every required clone declares
# ``hash_files`` (the load-bearing decks the integration tests
# resolve) and ships populated ``hashes``. ``--strict`` re-checks them
# on every run, so both layers are enforced: the commit-SHA pin proves
# the clone is at the right commit, and the content hash catches an
# upstream file rewritten in place.
#
# Hashes are computed over LINE-ENDING-NORMALIZED content (CRLF -> LF),
# so they are reproducible across platforms: a Windows checkout (git
# ``autocrlf``) and a fresh Linux CI checkout of the same text deck
# yield the same hash — the pin captures content, not the incidental
# EOL of the checkout. Regenerate after bumping a SHA with
# ``verify_external_data.py --update`` (any platform; no LF checkout
# required, thanks to normalization). ``hash_files`` entries must be
# text decks (.yaml / .dat); a binary file must not be declared there.

# ---------------------------------------------------------------------------
# OpenFAST regression-test suite (r-test)
# ---------------------------------------------------------------------------
# The OpenFAST team's curated regression decks. Source of truth for the
# NREL 5MW land + monopile + OC3 Hywind integration tests.
