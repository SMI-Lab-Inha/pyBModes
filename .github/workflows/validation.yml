# Validation workflow — external-data integration tests, hard-fail.
#
# Companion to the per-PR ``ci.yml`` integration step. That step
# tolerates exit code 5 ("no tests collected") because GitHub Actions
# runners don't carry the upstream OpenFAST / BModes data, so the
# default per-PR build doesn't enforce the published 0.01 % tolerance
# claim from VALIDATION.md. This workflow closes the gap noted in the
# external-review finding P1-1 (Phase 4 PR D3): it clones the upstream
# repositories on the fly, runs the integration suite WITHOUT exit-5
# tolerance, and uploads a verifier-report artifact so the published
# validation claim is enforced by reproducible CI rather than
# maintainer-local state.
#
# Triggers
# --------
#
# - ``workflow_dispatch`` — maintainers fire it from the Actions UI
#   before any tagged release (``docs/release_checklist.rst`` step 2
#   references this workflow).
# - Weekly cron (Monday 09:00 UTC) — runs the same pinned snapshot
#   every Monday so a regression in pybmodes itself surfaces on a
#   stable baseline. To catch upstream-deck *drift* against newer
#   HEADs, bump the manifest SHAs through the
#   ``verify_external_data.py --update`` path and ship the bump as
#   its own commit + CHANGELOG entry under *Changed*.
#
# Reproducibility note
# --------------------
#
# Each clone below checks out the SHA pinned in
# ``external/MANIFEST.toml`` (1.8.1 maintainer action; bumped from
# ``TBD`` in 1.8.0). The workflow is byte-reproducible from the
# tagged commit — anyone reproducing the published 0.01 % tolerance
# can re-run the same step set against the same upstream commits.
# File-hash pins (the ``hashes`` tables in the manifest) remain
# empty pending the ``verify_external_data.py --update`` rewrite.

name: Validation (external data)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC

permissions:
  contents: read

jobs:
  validation:
    name: Integration tests against pinned external decks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pybmodes with dev + plots + windio extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plots,windio,notebook]"

      # ---------------------------------------------------------------
      # Clone upstream external data into the expected layout, pinned
      # to the SHAs in ``external/MANIFEST.toml``.
      #
      # Each clone path matches ``relative_path`` in the manifest so
      # the integration test suite resolves the decks at the same
      # paths it does locally. We fetch the full git history (no
      # ``--depth=1``) so the explicit-SHA ``git checkout`` step
      # can resolve commits older than the shallow tip. Workflow run
      # time is dominated by the integration suite itself, not the
      # clones, so the extra fetch is cheap.
      #
      # BModes (CertTest 03 / 04 reference data) is NOT on GitHub; the
      # tests that depend on it skip cleanly when the data is absent
      # (``pytestmark = pytest.mark.integration`` at module level plus
      # per-file ``.is_file()`` guards). Those skips don't fail the
      # workflow because they're skip — not error — in pytest's exit
      # code.
      # ---------------------------------------------------------------

      - name: Clone OpenFAST r-test at manifest-pinned SHA
        # 1.8.1 manifest pin (NREL 5MW land / monopile / OC3 spar
        # regression decks). Full 40-char SHA matches what
        # ``scripts/verify_external_data.py`` compares ``git rev-parse
        # HEAD`` against — abbreviated SHAs in the manifest would
        # silently FAIL the verifier (static review on PR #81).
        run: |
          git clone https://github.com/OpenFAST/r-test.git \
            external/OpenFAST_files/r-test
          git -C external/OpenFAST_files/r-test \
            checkout dd5feaaaa500ba7283140107806300d551cff0a7

      - name: Clone IEA-3.4-130-RWT at manifest-pinned SHA
        run: |
          git clone https://github.com/IEAWindTask37/IEA-3.4-130-RWT.git \
            external/OpenFAST_files/IEA-3.4-130-RWT
          git -C external/OpenFAST_files/IEA-3.4-130-RWT \
            checkout 824f8d65196f9f84ee66df5e58e3a48a70a8f0c5

      - name: Clone IEA-15-240-RWT at manifest-pinned SHA
        # 1.8.1 manifest pin (v1.1 tower redesign — Allen 2020
        # free-decay reference).
        run: |
          git clone https://github.com/IEAWindTask37/IEA-15-240-RWT.git \
            external/OpenFAST_files/IEA-15-240-RWT
          git -C external/OpenFAST_files/IEA-15-240-RWT \
            checkout 86d51c8a1ee65be4f3686087a5c443c0b57e5cfb

      # ---------------------------------------------------------------
      # Run the verifier + integration suite.
      #
      # The verifier surfaces clone status (PASS / WARN / FAIL per
      # manifest entry) into the uploaded artifact. WARN means the
      # manifest SHA pin is still ``TBD`` (every entry as of 1.8.0);
      # FAIL means a clone drifted from a pinned SHA — release blocker.
      #
      # The integration suite runs WITHOUT the per-PR exit-5 tolerance:
      # since the upstream data was just cloned, ``pytest`` must
      # collect tests and they must pass. An exit code of 5 here
      # means the clone step silently failed and is a workflow failure.
      # ---------------------------------------------------------------

      - name: Generate verifier report
        # The verifier script exits 0 on PASS + WARN and 1 on FAIL
        # (see ``scripts/verify_external_data.py`` lines 246-248).
        # As of 1.8.1 every clone SHA is populated in the manifest,
        # so a healthy run produces PASS on every entry except
        # ``bmodes`` (which stays WARN because BModes is a NREL
        # download, not a GitHub clone — see the *Enforcement*
        # paragraph in VALIDATION.md). FAIL means a clone drifted
        # from its populated pinned SHA — release blocker. We use
        # the verifier's natural exit-code semantics with no
        # ``continue-on-error: true`` (PR #79 static-review pass
        # caught the original swallowing-of-FAILs).
        #
        # ``set -o pipefail`` ensures the verifier's exit code is
        # preserved through the ``tee`` pipe; without it ``tee``
        # always exits 0 and the verifier's signal is lost.
        run: |
          set -o pipefail
          python scripts/verify_external_data.py --strict \
              | tee verify-report.txt

      - name: Audit validation matrix
        # Same script as ci.yml — the matrix audit is cheap to repeat
        # here so the validation workflow is independently complete.
        run: python scripts/audit_validation_claims.py

      - name: Integration tests (hard-fail, no exit-5 tolerance)
        run: pytest -m integration --tb=short

      - name: Upload verifier report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: verify-report.txt
          retention-days: 90
