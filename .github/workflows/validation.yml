# Validation workflow — external-data integration tests, hard-fail.
#
# Companion to the per-PR ``ci.yml`` integration step. That step
# tolerates exit code 5 ("no tests collected") because GitHub Actions
# runners don't carry the upstream OpenFAST / BModes data, so the
# default per-PR build doesn't enforce the published 0.01 % tolerance
# claim from VALIDATION.md. This workflow closes the gap noted in the
# static-review finding P1-1 (Phase 4 PR D3): it clones the upstream
# repositories on the fly, runs the integration suite WITHOUT exit-5
# tolerance, and uploads a verifier-report artifact so the published
# validation claim is enforced by reproducible CI rather than
# maintainer-local state.
#
# Triggers
# --------
#
# - ``workflow_dispatch`` — maintainers fire it from the Actions UI
#   before any tagged release (``docs/release_checklist.rst`` step 2
#   references this workflow).
# - Weekly cron (Monday 09:00 UTC) — runs the same pinned snapshot
#   every Monday so a regression in pybmodes itself surfaces on a
#   stable baseline. To catch upstream-deck *drift* against newer
#   HEADs, bump the manifest SHAs through the
#   ``verify_external_data.py --update`` path and ship the bump as
#   its own commit + CHANGELOG entry under *Changed*.
#
# Reproducibility note
# --------------------
#
# Cloning is manifest-driven: ``verify_external_data.py --clone``
# fetches every *required* (non-optional) entry in
# ``external/MANIFEST.toml`` at its pinned commit SHA, so the workflow
# and the manifest can't drift apart (no hand-kept clone list). The
# subsequent ``--strict`` verify hard-fails if any required clone is
# missing or off its pin, and re-checks every populated ``hashes``
# entry. The workflow is reproducible from the tagged commit (pinned
# to immutable upstream commits) — anyone reproducing the published
# 0.01 % tolerance can re-run the same step set against the same
# upstream commits.
#
# File-hash pins are ACTIVE: every required clone ships populated
# ``hashes`` (computed over line-ending-normalized content, so they
# reproduce identically across Windows dev and Linux CI). ``--strict``
# below re-checks them on every run on top of commit-SHA pinning.
# Regenerate after bumping a SHA with ``verify_external_data.py
# --update`` (any platform).

name: Validation (external data)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC

permissions:
  contents: read

jobs:
  validation:
    name: Integration tests against pinned external decks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pybmodes with dev + plots + windio extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plots,windio,notebook]"

      # ---------------------------------------------------------------
      # Clone upstream external data into the expected layout, pinned
      # to the SHAs in ``external/MANIFEST.toml``.
      #
      # This is manifest-driven (no hardcoded URL/SHA list): the
      # verifier reads each required ``[clone.*]`` entry and shallow-
      # fetches its pinned commit into ``relative_path`` — the same
      # path the integration suite resolves it at. Adding or re-pinning
      # an upstream deck is now a manifest-only edit; the workflow
      # follows automatically. The set fetched here is every required
      # entry: OpenFAST r-test + IEA-3.4 / IEA-10 / IEA-15 / IEA-22 +
      # WISDEM. Optional cross-comparison references (MoorPy, RAFT) and
      # the non-redistributable BModes archive are skipped (marked
      # ``optional = true``); the CertTest 03/04 tests that need BModes
      # skip cleanly in pytest and so don't fail the workflow.
      # ---------------------------------------------------------------

      - name: Clone required external decks at manifest-pinned SHAs
        run: python scripts/verify_external_data.py --clone

      # ---------------------------------------------------------------
      # Run the verifier + integration suite.
      #
      # The verifier surfaces clone status (PASS / WARN / FAIL / SKIP
      # per manifest entry) into the uploaded artifact. Under
      # ``--strict`` a missing *required* clone is a FAIL — not a
      # silent SKIP — so the artifact can't look acceptable while a
      # pinned, non-optional entry went unchecked. SKIP is reserved
      # for the entries marked ``optional = true`` (MoorPy, RAFT, the
      # BModes archive). FAIL also fires if a clone drifted from its
      # pinned SHA — release blocker.
      #
      # The integration suite runs WITHOUT the per-PR exit-5 tolerance:
      # since the upstream data was just cloned, ``pytest`` must
      # collect tests and they must pass. An exit code of 5 here
      # means the clone step silently failed and is a workflow failure.
      # ---------------------------------------------------------------

      - name: Generate verifier report
        # The verifier exits 0 on PASS + WARN + SKIP and 1 on FAIL.
        # After the manifest-driven ``--clone`` step a healthy run is
        # PASS on every required entry (r-test + IEA-3.4/10/15/22 +
        # WISDEM) and SKIP on the optional ones (MoorPy / RAFT /
        # BModes). A required clone that's missing or off its pin
        # FAILs the step. No ``continue-on-error: true`` (PR #79
        # static-review pass caught the original swallowing-of-FAILs).
        #
        # ``set -o pipefail`` ensures the verifier's exit code is
        # preserved through the ``tee`` pipe; without it ``tee``
        # always exits 0 and the verifier's signal is lost.
        run: |
          set -o pipefail
          python scripts/verify_external_data.py --strict \
              | tee verify-report.txt

      - name: Audit validation matrix
        # Same script as ci.yml — the matrix audit is cheap to repeat
        # here so the validation workflow is independently complete.
        run: python scripts/audit_validation_claims.py

      - name: Integration tests (hard-fail, no exit-5 tolerance)
        run: pytest -m integration --tb=short

      - name: Upload verifier report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: verify-report.txt
          retention-days: 90
